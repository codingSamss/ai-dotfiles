platform: claude
runtime_version: 1

official_layout:
  skills_root: platforms/claude/skills
  runtime_root: ~/.claude
  notes:
    - 新增 skill 只需放到 platforms/claude/skills/<skill-name>
    - 如补充 runtime.yaml，core.sh 会一并同步到 ~/.claude/skills/<skill-name>/runtime.yaml
    - 保持当前 Claude 平台目录规范，不为单个 skill 新增额外同步入口
    - 平台级 runtime.yaml 仅供仓库内 AI 理解迁移规则，不同步到 ~/.claude 根目录

skill_runtime_contract:
  required_fields:
    - runtime_version
    - skill
    - platform
    - sync_paths
    - dependencies
    - manual_steps
    - verify
  optional_fields:
    - services
  notes:
    - 新增或更新 skill 时，只需在该 skill 目录补充 runtime.yaml，不需要修改 core.sh 或其他平台入口
    - sync_paths 仅声明真正需要进入 ~/.claude/skills/<skill> 的文件或目录，保持最小同步面
    - platform 必须固定为 claude，避免把 Codex 命令或布局误写到 Claude skill 中
    - skill 级 runtime.yaml 只同步到 ~/.claude/skills/<skill>/runtime.yaml，不进入 ~/.claude 根目录

managed_root_paths:
  - source: CLAUDE.md
    target: ~/.claude/CLAUDE.md
  - source: agents/
    target: ~/.claude/agents/
  - source: hooks/
    target: ~/.claude/hooks/
  - source: scripts/
    target: ~/.claude/scripts/
  - source: .mcp.json
    target: ~/.claude.json
    mode: merge-template

dependencies:
  commands:
    - python3
  notes:
    - MCP server 模板由仓库维护，本机真实鉴权与登录态仍需人工补齐

manual_steps:
  - 执行 ./setup.sh、提交、推送前，由读取仓库的 AI 比较 ~/.claude 与仓库受管全局配置的差异
  - 若本地有值得保留的新内容，先同步回仓库再继续；忽略 secrets、占位符和运行态噪音

verify:
  - ./setup.sh core
